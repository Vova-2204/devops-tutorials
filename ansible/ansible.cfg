[defaults]
inventory           = inventory/
roles_path          = roles/
host_key_checking   = False
remote_user         = ec2-user
private_key_file    = ~/.ssh/id_rsa
stdout_callback     = yaml
collections_path    = ./collections

[ssh_connection]
ssh_args            = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
pipelining          = True
