[defaults]
inventory           = inventory/
roles_path          = roles/
host_key_checking   = False
remote_user         = ec2-user
private_key_file    = ~/.ssh/devops-tutorials.pem
stdout_callback     = yaml
collections_path    = ./collections

[inventory]
enable_plugins      = amazon.aws.aws_ec2, auto, ini, yaml

[ssh_connection]
ssh_args            = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
pipelining          = False
